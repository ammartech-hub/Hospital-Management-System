<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

<style>

body{
    background:#f4f7fb;
}

.form-card{

    width:850px;
    margin:40px auto;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);

}

.form-title{

    text-align:center;
    color:#2563eb;
    font-weight:bold;
    margin-bottom:30px;

}

.form-control,
.form-select{

    height:50px;
    border-radius:12px;

}

.input-group-text{

    width:50px;
    justify-content:center;

}

.btn-update{

    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 35px;

}

.btn-update:hover{

    background:#1d4ed8;
    color:white;

}

</style>

</head>

<body>

<div class="form-card">

<h2 class="form-title">

<i class="bi bi-pencil-square"></i>

Edit Appointment

</h2>

<form
action="/updateAppointment"
method="post"
id="appointmentForm">

<input
type="hidden"
name="appointmentId"
th:value="${appointment.appointmentId}">

<div class="row">

<div class="col-md-6 mb-3">

<label>Patient ID</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="number"
id="patientId"
name="patientId"
class="form-control"
th:value="${appointment.patientId}"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Doctor ID</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-heart-pulse-fill"></i>

</span>

<input
type="number"
id="doctorId"
name="doctorId"
class="form-control"
th:value="${appointment.doctorId}"
required>

</div>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Appointment Date</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-calendar-event-fill"></i>

</span>

<input
type="date"
id="appointmentDate"
name="appointmentDate"
class="form-control"
th:value="${appointment.appointmentDate}"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Appointment Time</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-clock-fill"></i>

</span>

<input
type="time"
id="appointmentTime"
name="appointmentTime"
class="form-control"
th:value="${appointment.appointmentTime}"
required>

</div>

</div>

</div>

<div class="mb-4">

<label>Status</label>

<select
name="status"
class="form-select">

<option value="Scheduled"
th:selected="${appointment.status=='Scheduled'}">

Scheduled

</option>

<option value="Completed"
th:selected="${appointment.status=='Completed'}">

Completed

</option>

<option value="Cancelled"
th:selected="${appointment.status=='Cancelled'}">

Cancelled

</option>

</select>

</div>

<div class="text-center">

<button class="btn btn-update">

<i class="bi bi-check-circle-fill"></i>

Update Appointment

</button>

<a
href="/appointments"
class="btn btn-secondary">

<i class="bi bi-arrow-left"></i>

Back

</a>

</div>

</form>

</div>

<script src="/js/appointment.js"></script>

</body>

</html>
