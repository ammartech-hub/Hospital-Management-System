<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<style>

body{
    background:#f4f7fb;
}

.form-card{

    width:750px;
    margin:auto;
    margin-top:40px;

    background:white;

    border-radius:20px;

    padding:40px;

    box-shadow:0 20px 40px rgba(0,0,0,.08);

}

.form-title{

    text-align:center;

    margin-bottom:30px;

    color:#2563eb;

    font-weight:700;

}

.form-control,
.form-select{

    height:50px;

    border-radius:12px;

}

.btn-save{

    background:#2563eb;

    color:white;

    padding:12px 35px;

    border-radius:12px;

}

.btn-save:hover{

    background:#1d4ed8;

    color:white;

}

.input-group-text{

    width:50px;

    justify-content:center;

}

</style>

</head>

<body>

<div class="form-card">

<h2 class="form-title">

<i class="bi bi-person-plus-fill"></i>

Add Patient

</h2>

<form action="/savePatient" method="post" id="patientForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="text"
name="patientName"
class="form-control"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Age</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-calendar2-week"></i>

</span>

<input
type="number"
name="age"
class="form-control"
required>

</div>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Gender</label>

<select
name="gender"
class="form-select">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Phone</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-telephone-fill"></i>

</span>

<input
type="text"
name="phone"
class="form-control"
required>

</div>

</div>

</div>

<div class="mb-3">

<label>Address</label>

<textarea

name="address"

class="form-control"

rows="3"

required>

</textarea>

</div>

<div class="mb-4">

<label>Disease</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-heart-pulse-fill"></i>

</span>

<input
type="text"
name="disease"
class="form-control"
required>

</div>

</div>

<div class="text-center">

<button
class="btn btn-save">

<i class="bi bi-check-circle-fill"></i>

Save Patient

</button>

<a
href="/patients"
class="btn btn-secondary">

<i class="bi bi-arrow-left"></i>

Back

</a>

</div>

</form>

</div>

</body>

</html>
