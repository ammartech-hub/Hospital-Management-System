<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

<style>

body{
    background:#f4f7fb;
}

.edit-card{

    width:760px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);

}

.edit-title{

    text-align:center;
    color:#2563eb;
    font-weight:700;
    margin-bottom:30px;

}

.form-control,.form-select{

    border-radius:12px;
    height:50px;

}

.input-group-text{

    width:50px;
    justify-content:center;

}

.btn-update{

    background:#2563eb;
    color:white;
    border-radius:12px;
    padding:12px 30px;

}

.btn-update:hover{

    background:#1d4ed8;
    color:white;

}

</style>

</head>

<body>

<div class="edit-card">

<h2 class="edit-title">

<i class="bi bi-pencil-square"></i>

Edit Patient

</h2>

<form action="/updatePatient" method="post">

<input
type="hidden"
name="patientId"
th:value="${patient.patientId}">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-person-fill"></i>

</span>

<input
type="text"
name="patientName"
class="form-control"
th:value="${patient.patientName}"
required>

</div>

</div>

<div class="col-md-6 mb-3">

<label>Age</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-calendar2-week"></i>

</span>

<input
type="number"
name="age"
class="form-control"
th:value="${patient.age}"
required>

</div>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Gender</label>

<select
name="gender"
class="form-select">

<option value="Male" th:selected="${patient.gender=='Male'}">Male</option>

<option value="Female" th:selected="${patient.gender=='Female'}">Female</option>

<option value="Other" th:selected="${patient.gender=='Other'}">Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Phone</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-telephone-fill"></i>

</span>

<input
type="text"
name="phone"
class="form-control"
th:value="${patient.phone}"
required>

</div>

</div>

</div>

<div class="mb-3">

<label>Address</label>

<textarea
name="address"
class="form-control"
rows="3"
th:text="${patient.address}">
</textarea>

</div>

<div class="mb-4">

<label>Disease</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-heart-pulse-fill"></i>

</span>

<input
type="text"
name="disease"
class="form-control"
th:value="${patient.disease}"
required>

</div>

</div>

<div class="text-center">

<button class="btn btn-update">

<i class="bi bi-check-circle-fill"></i>

Update Patient

</button>

<a
href="/patients"
class="btn btn-secondary">

<i class="bi bi-arrow-left"></i>

Back

</a>

</div>

</form>

</div>

</body>

</html>
