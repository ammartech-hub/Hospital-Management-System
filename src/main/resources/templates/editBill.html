<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Edit Bill</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="form-card">

<h2>Edit Bill</h2>

<form action="/updateBill" method="post">

<input type="hidden" name="billId" th:value="${bill.billId}">

<input class="form-control mb-3" type="number" name="patientId" th:value="${bill.patientId}">

<input class="form-control mb-3" type="number" step="0.01" name="amount" th:value="${bill.amount}">

<select class="form-select mb-3" name="status">

<option value="Paid" th:selected="${bill.status=='Paid'}">Paid</option>

<option value="Pending" th:selected="${bill.status=='Pending'}">Pending</option>

</select>

<button class="btn btn-primary">Update Bill</button>

<a href="/billing" class="btn btn-secondary">Back</a>

</form>

</div>

</body>

</html>
