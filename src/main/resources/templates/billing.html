<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Billing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="sidebar">

<div class="logo">🏥 HMS</div>

<ul>

<li><a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>

<li><a href="/patients"><i class="bi bi-people-fill"></i> Patients</a></li>

<li><a href="/doctors"><i class="bi bi-heart-pulse-fill"></i> Doctors</a></li>

<li><a href="/appointments"><i class="bi bi-calendar-check-fill"></i> Appointments</a></li>

<li class="active"><a href="/billing"><i class="bi bi-cash-stack"></i> Billing</a></li>

</ul>

</div>

<div class="main">

<div class="topbar">

<div>

<h2>Billing</h2>

<p>Manage Hospital Bills</p>

</div>

<div class="right">

<div class="search-box">

<i class="bi bi-search"></i>

<input id="searchBilling" placeholder="Search Bill">

</div>

<a href="/addBill" class="btn btn-primary">

<i class="bi bi-plus-circle"></i>

Add Bill

</a>

</div>

</div>

<div class="table-box">

<table class="table table-hover">

<thead>

<tr>

<th>ID</th>

<th>Patient ID</th>

<th>Amount</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="billingTable">

<tr th:each="bill:${bills}">

<td th:text="${bill.billId}"></td>

<td th:text="${bill.patientId}"></td>

<td>₹ <span th:text="${bill.amount}"></span></td>

<td>

<span class="badge bg-success"

th:text="${bill.paymentStatus}"></span>

</td>

<td>

<a th:href="@{/editBill/{id}(id=${bill.billId})}" class="btn btn-warning btn-sm">

<i class="bi bi-pencil-fill"></i>

</a>

<a th:href="@{/deleteBill/{id}(id=${bill.billId})}" class="btn btn-danger btn-sm deleteBilling">

<i class="bi bi-trash-fill"></i>

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script src="/js/billing.js"></script>

</body>

</html>
