<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Appointments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="sidebar">

<div class="logo">

🏥 HMS

</div>

<ul>

<li>

<a href="/dashboard">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

</li>

<li>

<a href="/patients">

<i class="bi bi-people-fill"></i>

Patients

</a>

</li>

<li>

<a href="/doctors">

<i class="bi bi-heart-pulse-fill"></i>

Doctors

</a>

</li>

<li class="active">

<a href="/appointments">

<i class="bi bi-calendar-check-fill"></i>

Appointments

</a>

</li>

<li>

<a href="/billing">

<i class="bi bi-cash-stack"></i>

Billing

</a>

</li>

</ul>

</div>

<div class="main">

<div class="topbar">

<div>

<h2>

Appointments

</h2>

<p>

Manage Hospital Appointments

</p>

</div>

<div class="right">

<div class="search-box">

<i class="bi bi-search"></i>

<input
id="searchAppointment"
type="text"
placeholder="Search Appointment...">

</div>

<a
href="/addAppointment"
class="btn btn-primary">

<i class="bi bi-plus-circle"></i>

Add Appointment

</a>

</div>

</div>

<div class="table-box">

<table class="table table-hover align-middle">

<thead>

<tr>

<th>ID</th>

<th>Patient ID</th>

<th>Doctor ID</th>

<th>Date</th>

<th>Time</th>

<th>Status</th>

<th width="180">

Action

</th>

</tr>

</thead>

<tbody id="appointmentTable">

<tr th:each="appointment : ${appointments}">

<td th:text="${appointment.appointmentId}"></td>

<td>

<span class="badge bg-primary">

<span th:text="${appointment.patientId}"></span>

</span>

</td>

<td>

<span class="badge bg-success">

<span th:text="${appointment.doctorId}"></span>

</span>

</td>

<td th:text="${appointment.appointmentDate}"></td>

<td th:text="${appointment.appointmentTime}"></td>

<td>

<span
class="badge bg-warning text-dark"
th:text="${appointment.status}">

</span>

</td>

<td>

<a
th:href="@{/editAppointment/{id}(id=${appointment.appointmentId})}"
class="btn btn-warning btn-sm">

<i class="bi bi-pencil-fill"></i>

</a>

<a
th:href="@{/deleteAppointment/{id}(id=${appointment.appointmentId})}"
class="btn btn-danger btn-sm deleteAppointment">

<i class="bi bi-trash-fill"></i>

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script src="/js/appointment.js"></script>

</body>

</html>
